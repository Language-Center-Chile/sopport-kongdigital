# Nixpacks configuration for Coolify deployment
# Angular with SSR (Server Side Rendering)

providers = ["node"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]
dependsOn = ["install"]

[start]
cmd = "node dist/sopport-app/server/server.mjs"
dependsOn = ["build"]

[environment]
NODE_ENV = "production"
PORT = "3000"
