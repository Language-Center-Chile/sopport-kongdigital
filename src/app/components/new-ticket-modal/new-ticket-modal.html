<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-xs transition-opacity duration-300">
  <!-- Modal Card -->
  <div class="relative w-full max-w-3xl bg-white rounded-2xl shadow-2xl border border-slate-100 flex flex-col max-h-[95vh] overflow-hidden transform scale-100 transition-all duration-300">
    
    <!-- Header -->
    <div class="p-8 border-b border-slate-100">
      <div class="flex items-center gap-2 text-sm text-slate-500 mb-3">
        <span>Tickets</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
        <span class="font-semibold text-slate-700">Create New Ticket</span>
      </div>
      <div class="flex items-start justify-between">
        <div>
          <h2 class="text-2xl font-bold text-slate-900 font-display">Create New Ticket</h2>
          <p class="text-sm text-slate-500 mt-2">Report a technical issue or request assistance from our engineering team.</p>
        </div>
        <button 
          (click)="onCancel()" 
          class="text-slate-400 hover:text-slate-600 p-2 hover:bg-slate-100 rounded-lg transition-colors cursor-pointer"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Form Content -->
    <form (ngSubmit)="onSubmit()" class="flex-1 overflow-y-auto p-8 space-y-6">
      <!-- Subject -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Subject</label>
        <input 
          type="text" 
          name="subject"
          [(ngModel)]="subject"
          required
          placeholder="Briefly describe the issue (e.g., Unable to login to dashboard)" 
          class="w-full px-4 py-3 text-sm text-slate-800 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
        />
      </div>

      <!-- Category & Priority -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Category</label>
          <select 
            name="category"
            [(ngModel)]="category"
            class="w-full px-4 py-3 text-sm text-slate-800 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all appearance-none cursor-pointer"
          >
            @for (c of categories; track c) {
              <option [value]="c">{{ c }}</option>
            }
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Priority Level</label>
          <select 
            name="priority"
            [(ngModel)]="priority"
            class="w-full px-4 py-3 text-sm text-slate-800 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all appearance-none cursor-pointer"
          >
            @for (p of priorities; track p) {
              <option [value]="p">{{ p }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Description</label>
        <!-- Toolbar -->
        <div class="flex items-center gap-1 p-2 border border-slate-300 border-b-0 rounded-t-lg bg-slate-50">
          <button type="button" class="p-2 hover:bg-slate-200 rounded transition-colors cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-600" viewBox="0 0 24 24" fill="currentColor">
              <path d="M14.8284 4.92893C14.0474 4.14788 12.7811 4.14788 11.9999 4.92893L4.92888 11.9999C4.14783 12.781 4.14783 14.0473 4.92888 14.8284L9.69668 19.5962C10.0872 19.9867 10.7204 19.9867 11.1109 19.5962C11.5014 19.2057 11.5014 18.5725 11.1109 18.182L7.75731 14.8284L16.2425 6.34315C16.633 5.95262 16.633 5.31946 16.2425 4.92893C15.8519 4.53841 15.2188 4.53841 14.8282 4.92893L14.8284 4.92893Z"></path>
            </svg>
          </button>
          <button type="button" class="p-2 hover:bg-slate-200 rounded transition-colors cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-600" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 7H17V9H7V7ZM7 11H14V13H7V11ZM7 15H17V17H7V15Z"></path>
            </svg>
          </button>
          <button type="button" class="p-2 hover:bg-slate-200 rounded transition-colors cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-600" viewBox="0 0 24 24" fill="currentColor">
              <path d="M5 5H19V7H5V5ZM5 9H12V11H5V9ZM5 13H19V15H5V13ZM5 17H12V19H5V17Z"></path>
            </svg>
          </button>
          <div class="w-px h-5 bg-slate-300 mx-1"></div>
          <button type="button" class="p-2 hover:bg-slate-200 rounded transition-colors cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-600" viewBox="0 0 24 24" fill="currentColor">
              <path d="M15.5 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V6.5L15.5 2ZM14 6.5V4L18.5 8.5H16C14.8954 8.5 14 7.60457 14 6.5ZM6 20H18V11H14C12.8954 11 12 10.1046 12 9V4H6V20Z"></path>
            </svg>
          </button>
          <button type="button" class="p-2 hover:bg-slate-200 rounded transition-colors cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-600" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 7H11V13H17V11H13V7ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20Z"></path>
            </svg>
          </button>
        </div>
        <textarea 
          name="description"
          [(ngModel)]="description"
          rows="5"
          placeholder="Provide as much detail as possible, including steps to reproduce the issue..." 
          class="w-full px-4 py-3 text-sm text-slate-800 bg-white border border-slate-300 rounded-b-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
        ></textarea>
      </div>

      <!-- Attachments -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Attachments</label>
        <div class="flex items-center justify-center w-full">
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-lg cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 mb-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
              </svg>
              <p class="mb-2 text-sm text-slate-500"><span class="font-semibold">Click to upload</span> or drag and drop</p>
              <p class="text-xs text-slate-400">(max 10MB)</p>
            </div>
            <input type="file" class="hidden" multiple />
          </label>
        </div>
      </div>
    </form>

    <!-- Footer Actions -->
    <div class="flex items-center justify-between p-8 border-t border-slate-100 bg-slate-50/30">
      <div class="flex items-center gap-2 text-xs text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <span>Standard SLA for medium priority is 24 hours.</span>
      </div>
      <div class="flex items-center gap-3">
        <button 
          type="button" 
          (click)="onCancel()"
          class="px-4 py-2.5 text-sm font-semibold text-indigo-600 hover:text-indigo-700 hover:bg-indigo-50 rounded-lg cursor-pointer transition-all"
        >
          Save as Draft
        </button>
        <button 
          type="submit" 
          [disabled]="!subject"
          class="px-5 py-2.5 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg shadow-sm cursor-pointer transition-all"
        >
          Submit Ticket
        </button>
      </div>
    </div>

  </div>
</div>
