<div class="flex h-screen w-screen overflow-hidden bg-slate-100 font-sans text-slate-800 antialiased select-none">
  @if (!isLoginPage()) {
    <!-- Left Sidebar Navigation -->
    <app-sidebar (createTicket)="openCreateTicketModal()"></app-sidebar>
  }

  <!-- Right Side Main Content Space -->
  <div class="flex-1 flex flex-col h-full overflow-hidden">
    @if (!isLoginPage()) {
      <!-- Top Header Navigation & Search -->
      <app-header (createTicket)="openCreateTicketModal()"></app-header>
    }

    <!-- Dynamic Main Viewport Workspace -->
    <main class="flex-1 overflow-hidden flex flex-col bg-slate-50/50">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Modal Dialog overlays for Creating Tickets -->
@if (!isLoginPage() && isCreateTicketModalOpen()) {
  <app-new-ticket-modal 
    [isOpen]="isCreateTicketModalOpen()" 
    (close)="closeCreateTicketModal()"
  ></app-new-ticket-modal>
}
